# TEK17 RAG Configuration

[llm]
# provider: ollama | openai
provider = ollama
# model: llama3.2 | gpt-4.1-mini | gpt-5.2
model = llama3.2
# temperature: 0.0 (deterministic) | 0.3 (default) | 0.7 (creative)
temperature = 0.0

# max_tokens = 350


[openai]


[embeddings]
# provider: ollama | openai
provider = ollama
# model: nomic-embed-text (ollama) | text-embedding-3-small (openai)
model = nomic-embed-text
# base_url = http://localhost:11434

[retrieval]
# method: dense | sparse | hybrid
method = dense
# top_k: 6 (default) | 14 (broader recall)
top_k = 6
# hybrid_alpha: 0.25 | 0.50 (default) | 0.75 | 0.90
hybrid_alpha = 0.5
# bm25_k1 = 1.5
# bm25_b = 0.75
# hybrid_candidate_multiplier = 3

[chunking]
# chunk_size: 400 (fine-grained) | 800 (default) | 1200 (coarse)
chunk_size = 800
# chunk_overlap: 100 | 200 (default) | 300
chunk_overlap = 200

[prompt]
# version: baseline | relaxed | strict
version = baseline

[evaluation]
# mode: local (no server needed) | server (requires running serve)
mode = local
request_timeout_s = 300
# groundedness_threshold: 0.25 (default) — minimum relevance score
groundedness_threshold = 0.25
sweep_repeat = 1

[benchmark]
# Comma-separated list of OpenAI models to benchmark
openai_models = gpt-4.1-mini,gpt-5.2
